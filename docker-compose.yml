services:

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: second_brain_app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - ./backend/.env
    networks:
      - second_brain

  nginx:
    image: nginx:alpine
    container_name: second_brain_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend/public:/var/www/public
      - ./backend/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - second_brain

  mariadb:
    image: mariadb:11
    container_name: second_brain_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: second_brain
      MYSQL_USER: second_brain_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - second_brain

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: second_brain_pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mariadb
      PMA_USER: second_brain_user
      PMA_PASSWORD: secret
    depends_on:
      - mariadb
    networks:
      - second_brain

networks:
  second_brain:
    driver: bridge

volumes:
  db_data:
