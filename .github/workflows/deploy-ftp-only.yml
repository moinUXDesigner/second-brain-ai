name: Deploy to Hostinger (FTP Only)

# Use this workflow if SSH is not available on your Hostinger plan
# Note: Database migrations will need to be run manually

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ==================== Verify Secrets ====================
      - name: Check required secrets
        run: |
          echo "Checking if required secrets are configured..."
          if [ -z "${{ secrets.FTP_SERVER }}" ]; then
            echo "❌ ERROR: FTP_SERVER secret is not set!"
            echo "Please configure GitHub Secrets: Settings → Secrets and variables → Actions"
            echo "See GITHUB_SECRETS.md for detailed instructions"
            exit 1
          fi
          if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
            echo "❌ ERROR: FTP_USERNAME secret is not set!"
            exit 1
          fi
          if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            echo "❌ ERROR: FTP_PASSWORD secret is not set!"
            exit 1
          fi
          echo "✅ FTP secrets are configured"

      # ==================== Frontend Build ====================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api-secondbrain.khajamynuddin.com/api
          VITE_GAS_WEB_APP_URL: ${{ secrets.VITE_GAS_WEB_APP_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Copy .htaccess to dist
        run: cp public/.htaccess dist/.htaccess

      # ==================== Deploy Frontend ====================
      - name: Deploy Frontend to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/secondbrain/
          dangerous-clean-slate: true

      # ==================== Backend Preparation ====================
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, bcmath, pdo, mysql
          tools: composer:v2

      - name: Install backend dependencies
        working-directory: ./backend
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Create backend .env file
        working-directory: ./backend
        run: |
          echo "APP_NAME=\"Second Brain AI\"" > .env
          echo "APP_ENV=production" >> .env
          echo "APP_KEY=${{ secrets.LARAVEL_APP_KEY }}" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_URL=https://api-secondbrain.khajamynuddin.com" >> .env
          echo "" >> .env
          echo "LOG_CHANNEL=stack" >> .env
          echo "LOG_LEVEL=error" >> .env
          echo "" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "" >> .env
          echo "SANCTUM_STATEFUL_DOMAINS=secondbrain.khajamynuddin.com" >> .env
          echo "SESSION_DOMAIN=.khajamynuddin.com" >> .env
          echo "" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "" >> .env
          echo "CORS_ALLOWED_ORIGINS=https://secondbrain.khajamynuddin.com" >> .env

      - name: Create storage and cache directories
        working-directory: ./backend
        run: |
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs
          mkdir -p bootstrap/cache

      - name: Create migration helper script
        working-directory: ./backend
        run: |
          cat > migrate.php << 'EOF'
          <?php
          // Run this file once via browser: https://api-secondbrain.khajamynuddin.com/migrate.php
          // Then DELETE this file for security!
          
          require __DIR__.'/vendor/autoload.php';
          $app = require_once __DIR__.'/bootstrap/app.php';
          $kernel = $app->make(Illuminate\Contracts\Console\Kernel::class);
          
          echo "<pre>";
          echo "Running migrations...\n\n";
          
          $kernel->call('migrate', ['--force' => true]);
          
          echo "\n\nMigrations completed!";
          echo "\n\n⚠️ IMPORTANT: Delete this file (migrate.php) now for security!";
          echo "</pre>";
          EOF

      # ==================== Deploy Backend ====================
      - name: Deploy Backend to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: /public_html/api-secondbrain/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.env.example
            **/.editorconfig
            **/.styleci.yml
            **/phpunit.xml
            **/README.md

      # ==================== Post-Deployment Instructions ====================
      - name: Deployment Complete - Manual Steps Required
        run: |
          echo "✅ Frontend deployed to: https://secondbrain.khajamynuddin.com"
          echo "✅ Backend deployed to: https://api-secondbrain.khajamynuddin.com"
          echo ""
          echo "⚠️ MANUAL STEPS REQUIRED:"
          echo "1. Run migrations by visiting: https://api-secondbrain.khajamynuddin.com/migrate.php"
          echo "2. After migrations complete, DELETE migrate.php file via FTP/File Manager"
          echo "3. Set folder permissions via File Manager:"
          echo "   - storage/ → 755"
          echo "   - bootstrap/cache/ → 755"
          echo "4. Enable SSL certificates in Hostinger hPanel"
          echo "5. Test the application"
