name: Deploy to Hostinger via SSH

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ==================== Verify Secrets ====================
      - name: Validate Required Secrets
        run: |
          echo "🔍 Validating required secrets..."
          MISSING_SECRETS=""
          
          [ -z "${{ secrets.SSH_HOST }}" ] && MISSING_SECRETS="${MISSING_SECRETS}SSH_HOST "
          [ -z "${{ secrets.SSH_PORT }}" ] && MISSING_SECRETS="${MISSING_SECRETS}SSH_PORT "
          [ -z "${{ secrets.SSH_USERNAME }}" ] && MISSING_SECRETS="${MISSING_SECRETS}SSH_USERNAME "
          [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] && MISSING_SECRETS="${MISSING_SECRETS}SSH_PRIVATE_KEY "
          [ -z "${{ secrets.DB_HOST }}" ] && MISSING_SECRETS="${MISSING_SECRETS}DB_HOST "
          [ -z "${{ secrets.DB_PORT }}" ] && MISSING_SECRETS="${MISSING_SECRETS}DB_PORT "
          [ -z "${{ secrets.DB_DATABASE }}" ] && MISSING_SECRETS="${MISSING_SECRETS}DB_DATABASE "
          [ -z "${{ secrets.DB_USERNAME }}" ] && MISSING_SECRETS="${MISSING_SECRETS}DB_USERNAME "
          [ -z "${{ secrets.DB_PASSWORD }}" ] && MISSING_SECRETS="${MISSING_SECRETS}DB_PASSWORD "
          [ -z "${{ secrets.LARAVEL_APP_KEY }}" ] && MISSING_SECRETS="${MISSING_SECRETS}LARAVEL_APP_KEY "
          [ -z "${{ secrets.OPENAI_API_KEY }}" ] && MISSING_SECRETS="${MISSING_SECRETS}OPENAI_API_KEY "
          
          if [ -n "$MISSING_SECRETS" ]; then
            echo "❌ ERROR: Missing required secrets: $MISSING_SECRETS"
            echo "Please add these secrets in: Settings → Secrets and variables → Actions"
            exit 1
          fi
          
          echo "✅ All required secrets are configured"
          echo "📋 SSH_HOST: ${{ secrets.SSH_HOST }}"
          echo "📋 SSH_PORT: ${{ secrets.SSH_PORT }}"
          echo "📋 SSH_USERNAME: ${{ secrets.SSH_USERNAME }}"

      # ==================== Frontend Build ====================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api-secondbrain.khajamynuddin.com/api
          VITE_GAS_WEB_APP_URL: ${{ secrets.VITE_GAS_WEB_APP_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Copy .htaccess to dist
        run: cp public/.htaccess dist/.htaccess

      # ==================== Setup SSH ====================
      - name: Setup SSH Key
        run: |
          echo "🔐 Setting up SSH authentication..."
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Save private key
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Configure SSH to skip host key verification (safe for CI/CD)
          cat > ~/.ssh/config << EOF
          Host hostinger
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USERNAME }}
            Port ${{ secrets.SSH_PORT }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          EOF
          
          chmod 600 ~/.ssh/config
          echo "✅ SSH configuration complete"

      - name: Test SSH Connection
        run: |
          echo "🧪 Testing SSH connection..."
          ssh hostinger "echo '✅ SSH connection successful!'; pwd"

      # ==================== Deploy Frontend ====================
      - name: Create Frontend Directory
        run: |
          echo "📁 Creating frontend directory..."
          ssh hostinger "mkdir -p /home/u484303972/domains/khajamynuddin.com/public_html/secondbrain"

      - name: Deploy Frontend via rsync
        run: |
          echo "🚀 Deploying frontend to secondbrain.khajamynuddin.com..."
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./dist/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/u484303972/domains/khajamynuddin.com/public_html/secondbrain/
          echo "✅ Frontend deployed successfully"

      # ==================== Backend Preparation ====================
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, bcmath, pdo, mysql
          tools: composer:v2

      - name: Install backend dependencies
        working-directory: ./backend
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Create backend .env file
        working-directory: ./backend
        run: |
          echo "APP_NAME=\"Second Brain AI\"" > .env
          echo "APP_ENV=production" >> .env
          echo "APP_KEY=${{ secrets.LARAVEL_APP_KEY }}" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_URL=https://api-secondbrain.khajamynuddin.com" >> .env
          echo "" >> .env
          echo "LOG_CHANNEL=stack" >> .env
          echo "LOG_LEVEL=error" >> .env
          echo "" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "" >> .env
          echo "SANCTUM_STATEFUL_DOMAINS=secondbrain.khajamynuddin.com" >> .env
          echo "SESSION_DOMAIN=.khajamynuddin.com" >> .env
          echo "" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "" >> .env
          echo "CORS_ALLOWED_ORIGINS=https://secondbrain.khajamynuddin.com" >> .env

      - name: Create storage and cache directories
        working-directory: ./backend
        run: |
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs
          mkdir -p bootstrap/cache

      # ==================== Deploy Backend ====================
      - name: Create Backend Directory
        run: |
          echo "📁 Creating backend directory..."
          ssh hostinger "mkdir -p /home/u484303972/domains/khajamynuddin.com/public_html/api-secondbrain"

      - name: Deploy Backend via rsync
        run: |
          echo "🚀 Deploying backend to api-secondbrain.khajamynuddin.com..."
          rsync -avz \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env.example' \
            --exclude='.editorconfig' \
            --exclude='phpunit.xml' \
            ./backend/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/u484303972/domains/khajamynuddin.com/public_html/api-secondbrain/
          echo "✅ Backend deployed successfully"

      # ==================== Post-Deployment ====================
      - name: Set Permissions
        run: |
          echo "🔒 Setting correct permissions..."
          ssh hostinger << 'EOF'
            cd /home/u484303972/domains/khajamynuddin.com/public_html/api-secondbrain
            chmod -R 755 storage bootstrap/cache
            echo "✅ Permissions set"
          EOF

      - name: Run Database Migrations
        run: |
          echo "🗄️ Running database migrations..."
          ssh hostinger << 'EOF'
            cd /home/u484303972/domains/khajamynuddin.com/public_html/api-secondbrain
            php artisan migrate --force
            echo "✅ Migrations completed"
          EOF

      - name: Optimize Laravel
        run: |
          echo "⚡ Optimizing Laravel application..."
          ssh hostinger << 'EOF'
            cd /home/u484303972/domains/khajamynuddin.com/public_html/api-secondbrain
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo "✅ Laravel optimized"
          EOF

      - name: Deployment Complete
        run: |
          echo "✅ Frontend deployed to: https://secondbrain.khajamynuddin.com"
          echo "✅ Backend deployed to: https://api-secondbrain.khajamynuddin.com"
